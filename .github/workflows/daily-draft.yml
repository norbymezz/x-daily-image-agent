name: daily-draft

on:
  workflow_dispatch:
  schedule:
    - cron: "0 11 * * *"

jobs:
  build-daily-image-draft:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily draft agent
        run: python src/run_daily.py

      - name: Upload draft artifacts
        uses: actions/upload-artifact@v4
        with:
          name: daily-image-draft
          path: |
            assets/published/
            logs/
